<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>寻常小馆 | 咖啡功能入口</title>
  <style>
    :root {
      --ink: #f9f6f1;
      --muted: rgba(249, 246, 241, .74);
      --line: rgba(255,255,255,.18);
      --panel: rgba(16,11,8,.42);
      --gold: #f0c77e;
      --blue: #73b7ff;
      color-scheme: dark;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100dvh;
      background:
        linear-gradient(180deg, rgba(10,7,5,.48), rgba(10,7,5,.78)),
        url("assets/cafe/2.jpg") center / cover,
        #0f0906;
      color: var(--ink);
      font-family: "Microsoft YaHei UI", "Microsoft YaHei", "PingFang SC", "HarmonyOS Sans SC", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
      overflow-x: hidden;
    }
    a { color: inherit; }
    .shell {
      min-height: 100dvh;
      position: relative;
      z-index: 1;
      padding: 18px 0 42px;
    }
    .hero {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      min-height: clamp(330px, 47vw, 500px);
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(360px, .56fr);
      gap: clamp(18px, 4vw, 42px);
      align-items: center;
      padding: clamp(22px, 4vw, 44px);
      border-radius: 32px;
      border: 1px solid rgba(255,255,255,.24);
      background:
        linear-gradient(180deg, rgba(0,0,0,.08), rgba(0,0,0,.60)),
        rgba(16,11,8,.32);
      box-shadow: 0 38px 110px rgba(0,0,0,.42);
    }
    .hero-brand {
      display: inline-flex;
      min-height: 36px;
      align-items: center;
      padding: 0 16px;
      border-radius: 999px;
      background:
        linear-gradient(135deg, rgba(255,255,255,.26), rgba(255,255,255,.09)),
        rgba(16,12,9,.44);
      border: 1px solid rgba(255,255,255,.18);
      color: var(--ink);
      font-weight: 900;
      margin: 0 0 18px;
      width: fit-content;
      text-shadow: 0 1px 18px rgba(255,255,255,.24);
    }
    .hero h1 {
      margin: 0;
      font-size: clamp(38px, 5.9vw, 72px);
      line-height: 1.02;
      letter-spacing: 0;
      font-weight: 950;
      max-width: none;
      white-space: nowrap;
      text-shadow: 0 18px 54px rgba(0,0,0,.42), 0 0 38px rgba(255,255,255,.10);
    }
    .hero-copy {
      max-width: 720px;
      margin: 18px 0 0;
      color: var(--muted);
      font-size: clamp(16px, 1.9vw, 22px);
      line-height: 1.5;
    }
    .mood-strip {
      align-self: center;
      justify-self: end;
      width: min(100%, 430px);
      display: grid;
      grid-template-columns: minmax(122px, 1.05fr) repeat(2, minmax(82px, .86fr));
      grid-template-rows: repeat(3, clamp(86px, 9.2vw, 124px));
      gap: 10px;
    }
    .mood-photo {
      display: block;
      width: 100%;
      height: 100%;
      min-width: 0;
      min-height: 0;
      padding: 0;
      cursor: zoom-in;
      overflow: hidden;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(0,0,0,.18);
      box-shadow: 0 18px 38px rgba(0,0,0,.28);
    }
    .mood-strip img {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 0;
      object-fit: cover;
      filter: saturate(1.05) contrast(1.04) brightness(.94);
      transition: transform 180ms ease, filter 180ms ease;
    }
    .mood-photo:hover img,
    .mood-photo:focus-visible img {
      transform: scale(1.035);
      filter: saturate(1.12) contrast(1.06) brightness(1);
    }
    .mood-photo:focus-visible {
      outline: 3px solid rgba(115,183,255,.72);
      outline-offset: 3px;
    }
    .mood-photo:first-child {
      grid-row: 1 / span 3;
    }
    .mood-photo:nth-child(2) img {
      object-position: 50% 42%;
    }
    .mood-photo:nth-child(3) img {
      object-position: 48% 55%;
    }
    .mood-photo:nth-child(4) img {
      object-position: 50% 50%;
    }
    .mood-photo:nth-child(5) img {
      object-position: 58% 58%;
    }
    .mood-photo:nth-child(6) img {
      object-position: 50% 52%;
    }
    .mood-photo:nth-child(7) img {
      object-position: 55% 46%;
    }
    .feature-grid {
      width: min(1180px, calc(100% - 28px));
      margin: 18px auto 0;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }
    .feature-card {
      display: grid;
      gap: 10px;
      padding: 18px;
      min-height: 162px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.20);
      background:
        linear-gradient(145deg, rgba(255,255,255,.16), rgba(0,0,0,.18)),
        var(--panel);
      text-decoration: none;
      color: inherit;
      box-shadow: 0 24px 58px rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.14);
      transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
    }
    .feature-card:hover {
      transform: translateY(-3px);
      border-color: rgba(255,255,255,.34);
      box-shadow: 0 30px 64px rgba(0,0,0,.34);
    }
    .feature-index {
      display: inline-flex;
      width: 34px;
      height: 34px;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: rgba(255,255,255,.12);
      color: var(--gold);
      font-weight: 900;
      font-size: 13px;
    }
    .feature-card h2 {
      margin: 0;
      font-size: 20px;
      line-height: 1.1;
      font-weight: 900;
    }
    .feature-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
      font-size: 14px;
    }
    .feature-arrow {
      margin-top: auto;
      color: #fff;
      font-size: 18px;
      font-weight: 900;
    }
    .feature-card:focus-visible {
      outline: 3px solid rgba(115,183,255,.72);
      outline-offset: 3px;
    }
    .cafe-lightbox[hidden] {
      display: none;
    }
    .cafe-lightbox {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: grid;
      place-items: center;
      padding: clamp(18px, 4vw, 42px);
      background: rgba(5,4,3,.86);
      -webkit-backdrop-filter: blur(20px);
      backdrop-filter: blur(20px);
    }
    .cafe-lightbox img {
      display: block;
      max-width: min(92vw, 1180px);
      max-height: 84dvh;
      width: auto;
      height: auto;
      object-fit: contain;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.22);
      box-shadow: 0 34px 100px rgba(0,0,0,.58);
    }
    .lightbox-close {
      position: fixed;
      top: clamp(12px, 3vw, 28px);
      right: clamp(12px, 3vw, 28px);
      width: 44px;
      height: 44px;
      border: 1px solid rgba(255,255,255,.24);
      border-radius: 999px;
      background: rgba(255,255,255,.12);
      color: #fff;
      cursor: pointer;
      font-size: 28px;
      line-height: 1;
      -webkit-backdrop-filter: blur(18px);
      backdrop-filter: blur(18px);
    }
    .lightbox-close:focus-visible {
      outline: 3px solid rgba(115,183,255,.72);
      outline-offset: 3px;
    }
    body.lightbox-open {
      overflow: hidden;
    }
    [data-page-shell] {
      transition: transform 220ms ease, opacity 220ms ease;
      will-change: transform, opacity;
    }
    body.slide-out-left [data-page-shell] {
      transform: translateX(-24px);
      opacity: 0;
    }
    body.slide-out-right [data-page-shell] {
      transform: translateX(24px);
      opacity: 0;
    }
    body.slide-in [data-page-shell] {
      transform: translateX(24px);
      opacity: 0;
    }
    @media (max-width: 900px) {
      .feature-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
    @media (max-width: 960px) {
      .hero {
        grid-template-columns: 1fr;
      }
      .mood-strip {
        justify-self: stretch;
        width: 100%;
      }
    }
    @media (max-width: 760px) {
      .shell {
        padding-bottom: 28px;
      }
      .hero {
        width: calc(100% - 20px);
        min-height: 260px;
        padding: 18px;
        border-radius: 24px;
        grid-template-columns: 1fr;
      }
      .hero h1 {
        font-size: clamp(34px, 10.8vw, 46px);
        line-height: 1.04;
        max-width: 100%;
        white-space: normal;
      }
      .mood-strip {
        align-self: auto;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        grid-template-rows: none;
        grid-auto-rows: auto;
        gap: 8px;
        min-height: auto;
      }
      .mood-photo:nth-child(n) {
        grid-column: auto;
        grid-row: auto;
        width: 100%;
        aspect-ratio: 1 / 1;
        border-radius: 12px;
      }
      .mood-photo:first-child {
        grid-column: 1 / -1;
        aspect-ratio: 16 / 10;
      }
      .feature-grid {
        width: calc(100% - 20px);
        grid-template-columns: 1fr;
        gap: 12px;
      }
      .feature-card {
        min-height: 136px;
      }
      .feature-card h2 {
        font-size: 18px;
      }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <div class="shell" data-page-shell>
    <section class="hero">
      <div>
        <p class="hero-brand">寻常小馆</p>
        <h1>把晨光倒进一杯咖啡</h1>
        <p class="hero-copy">寻常小馆里,氤氲的香气中弥漫着浪漫的气息,每一口咖啡都像是品尝着时光的深邃。点一下功能入口，就进到单独的页面。</p>
      </div>
      <div class="mood-strip" aria-label="咖啡馆照片">
        <button class="mood-photo" type="button" data-full-src="assets/cafe/1.jpg" aria-label="查看咖啡馆大图 1">
          <img src="assets/cafe/1.jpg" alt="" width="1080" height="1440">
        </button>
        <button class="mood-photo" type="button" data-full-src="assets/cafe/2.jpg" aria-label="查看咖啡馆大图 2">
          <img src="assets/cafe/2.jpg" alt="" width="1920" height="1080">
        </button>
        <button class="mood-photo" type="button" data-full-src="assets/cafe/3.jpg" aria-label="查看咖啡馆大图 3">
          <img src="assets/cafe/3.jpg" alt="" width="1080" height="1440">
        </button>
        <button class="mood-photo" type="button" data-full-src="assets/cafe/4.jpg" aria-label="查看咖啡馆大图 4">
          <img src="assets/cafe/4.jpg" alt="" width="1080" height="1440">
        </button>
        <button class="mood-photo" type="button" data-full-src="assets/cafe/5.jpg" aria-label="查看咖啡馆大图 5">
          <img src="assets/cafe/5.jpg" alt="" width="1080" height="1440">
        </button>
        <button class="mood-photo" type="button" data-full-src="assets/cafe/6.jpg" aria-label="查看咖啡馆大图 6">
          <img src="assets/cafe/6.jpg" alt="" width="1080" height="1440">
        </button>
        <button class="mood-photo" type="button" data-full-src="assets/cafe/7.jpg" aria-label="查看咖啡馆大图 7">
          <img src="assets/cafe/7.jpg" alt="" width="1080" height="1440">
        </button>
      </div>
    </section>

    <main class="feature-grid" aria-label="功能入口">
      <a class="feature-card slide-link" href="beans.html">
        <span class="feature-index">01</span>
        <h2>咖啡豆图鉴</h2>
        <p>看真实豆图、风味标签和适合的冲煮路线。</p>
        <span class="feature-arrow">→</span>
      </a>
      <a class="feature-card slide-link" href="history.html">
        <span class="feature-index">02</span>
        <h2>咖啡历史</h2>
        <p>从云南山谷开始，读懂中国咖啡的来路。</p>
        <span class="feature-arrow">→</span>
      </a>
      <a class="feature-card slide-link" href="china-beans.html">
        <span class="feature-index">03</span>
        <h2>热门豆种</h2>
        <p>把常见产区和门店拼配豆种先看清楚。</p>
        <span class="feature-arrow">→</span>
      </a>
      <a class="feature-card slide-link" href="methods.html">
        <span class="feature-index">04</span>
        <h2>咖啡做法</h2>
        <p>看变量怎么改变一杯咖啡的酸甜苦厚。</p>
        <span class="feature-arrow">→</span>
      </a>
      <a class="feature-card slide-link" href="workspace.html">
        <span class="feature-index">05</span>
        <h2>制作工作台</h2>
        <p>进入手冲和机器制作的参数控制台。</p>
        <span class="feature-arrow">→</span>
      </a>
      <a class="feature-card slide-link" href="difference.html">
        <span class="feature-index">06</span>
        <h2>模式差异</h2>
        <p>同一款豆子，手冲和机器会怎么说话。</p>
        <span class="feature-arrow">→</span>
      </a>
    </main>

  </div>

  <div class="cafe-lightbox" id="cafeLightbox" role="dialog" aria-modal="true" aria-label="咖啡馆大图预览" hidden>
    <button class="lightbox-close" type="button" id="cafeLightboxClose" aria-label="关闭大图">×</button>
    <img id="cafeLightboxImage" src="" alt="咖啡馆大图预览">
  </div>

  <script>
    (() => {
      const lightbox = document.getElementById("cafeLightbox");
      const lightboxImage = document.getElementById("cafeLightboxImage");
      const closeButton = document.getElementById("cafeLightboxClose");
      const photoButtons = document.querySelectorAll(".mood-photo");
      let lastTrigger = null;

      function openGalleryLightbox(src, trigger) {
        if (!lightbox || !lightboxImage) return;
        lastTrigger = trigger;
        lightboxImage.src = src;
        lightbox.hidden = false;
        document.body.classList.add("lightbox-open");
        closeButton?.focus();
      }

      function closeGalleryLightbox() {
        if (!lightbox || !lightboxImage || lightbox.hidden) return;
        lightbox.hidden = true;
        lightboxImage.removeAttribute("src");
        document.body.classList.remove("lightbox-open");
        lastTrigger?.focus();
      }

      photoButtons.forEach((button) => {
        button.addEventListener("click", () => {
          openGalleryLightbox(button.dataset.fullSrc, button);
        });
      });

      closeButton?.addEventListener("click", closeGalleryLightbox);
      lightbox?.addEventListener("click", (event) => {
        if (event.target === lightbox) closeGalleryLightbox();
      });
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") closeGalleryLightbox();
      });
    })();
  </script>
  <script src="slide-navigation.js"></script>
</body>
</html>
